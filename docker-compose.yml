services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: internal-assistant-postgres
    environment:
      POSTGRES_DB: assistant
      POSTGRES_USER: assistant
      POSTGRES_PASSWORD: assistant
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U assistant -d assistant"]
      interval: 10s
      timeout: 5s
      retries: 5

  app-service:
    build:
      context: .
      dockerfile: app-service/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://assistant:assistant@postgres:5432/assistant
      CUSTOM_INCIDENTS_API_BASE_URL: http://custom-incidents-api-function:7071
      INDEXER_API_BASE_URL: http://indexer-function:7071
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy

  custom-incidents-api-function:
    build:
      context: .
      dockerfile: functions/custom-incidents-api-function/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://assistant:assistant@postgres:5432/assistant
    ports:
      - "7071:7071"
    depends_on:
      postgres:
        condition: service_healthy

  indexer-function:
    build:
      context: .
      dockerfile: functions/indexer-function/Dockerfile
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+psycopg://assistant:assistant@postgres:5432/assistant
    ports:
      - "7072:7071"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
