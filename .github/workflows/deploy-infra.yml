name: Deploy Infra

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROJECT_NAME: internal-assistant
      ENVIRONMENT_NAME: demo
      AZURE_LOCATION: westeurope
      AZURE_RESOURCE_GROUP: ${{ secrets.AZURE_RESOURCE_GROUP }}
      AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      POSTGRES_ADMIN_USER: pgadmininternal
      POSTGRES_ADMIN_PASSWORD: ${{ secrets.POSTGRES_ADMIN_PASSWORD }}
      POSTGRES_DATABASE_NAME: assistant
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CHAT_MODEL: gpt-4o-mini
      EMBEDDING_MODEL: text-embedding-3-small
      EMBEDDING_DIMENSIONS: 512
      ADMIN_API_KEY: ${{ secrets.ADMIN_API_KEY }}
      APP_SHARED_SECRET: ${{ secrets.APP_SHARED_SECRET }}
      MICROSOFT_APP_ID: ${{ secrets.MICROSOFT_APP_ID }}
      MICROSOFT_APP_PASSWORD: ${{ secrets.MICROSOFT_APP_PASSWORD }}
      ALLOWED_ORIGINS: https://teams.microsoft.com
      ENABLE_APPLICATION_INSIGHTS: true
    steps:
      - uses: actions/checkout@v4

      - uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Validate Bicep
        run: |
          az group create --name "$AZURE_RESOURCE_GROUP" --location "$AZURE_LOCATION" >/dev/null
          az deployment group validate \
            --resource-group "$AZURE_RESOURCE_GROUP" \
            --template-file infra/main.bicep \
            --parameters \
              projectName="$PROJECT_NAME" \
              environmentName="$ENVIRONMENT_NAME" \
              location="$AZURE_LOCATION" \
              postgresAdminUser="$POSTGRES_ADMIN_USER" \
              postgresAdminPassword="$POSTGRES_ADMIN_PASSWORD" \
              postgresDatabaseName="$POSTGRES_DATABASE_NAME" \
              openAiApiKey="$OPENAI_API_KEY" \
              chatModel="$CHAT_MODEL" \
              embeddingModel="$EMBEDDING_MODEL" \
              embeddingDimensions="$EMBEDDING_DIMENSIONS" \
              adminApiKey="$ADMIN_API_KEY" \
              appSharedSecret="$APP_SHARED_SECRET" \
              microsoftAppId="$MICROSOFT_APP_ID" \
              microsoftAppPassword="$MICROSOFT_APP_PASSWORD" \
              allowedOrigins='["https://teams.microsoft.com"]' \
              enableApplicationInsights=true

      - name: Deploy infra
        run: bash ./scripts/deploy_infra.sh
